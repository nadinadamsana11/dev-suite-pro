<div class="flex justify-center my-8">
    <script>
        atOptions = {
            'key' : '526efda984115f912d5cc14a9117a37e',

    <!-- Feedback Toast -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl transition-all duration-300 translate-y-20 opacity-0 pointer-events-none">
        Preparing download...
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileListContainer = document.getElementById('fileListContainer');
        const settingsContainer = document.getElementById('settingsContainer');
        const formatGrid = document.getElementById('formatGrid');
        const convertBtn = document.getElementById('convertBtn');
        const toast = document.getElementById('toast');
        const btnText = document.getElementById('btnText');

        let selectedFiles = [];
        let targetFormat = '';

        const formatMap = {
            'image': ['PNG', 'JPG', 'WEBP', 'PDF'],
            'application/pdf': ['DOCX', 'JPG', 'PNG'],
            'text': ['PDF', 'DOCX', 'HTML'],
            'default': ['PDF', 'ZIP']
        };

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        ['dragenter', 'dragover'].forEach(n => dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.add('active'); }));
        ['dragleave', 'drop'].forEach(n => dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.remove('active'); if(n==='drop') handleFiles(e.dataTransfer.files); }));

        function handleFiles(files) {
            selectedFiles = [...files];
            if (selectedFiles.length > 0) {
                updateFileList();
                updateFormatOptions(selectedFiles[0].type);
                fileListContainer.classList.remove('hidden');
                settingsContainer.classList.remove('hidden');
                convertBtn.disabled = false;
            }
        }

        function updateFormatOptions(mimeType) {
            let type = 'default';
            if (mimeType.startsWith('image/')) type = 'image';
            else if (mimeType === 'application/pdf') type = 'application/pdf';
            else if (mimeType.startsWith('text/')) type = 'text';

            const options = formatMap[type];
            formatGrid.innerHTML = '';
            targetFormat = options[0];

            options.forEach((fmt, i) => {
                const btn = document.createElement('button');
                btn.className = `format-option py-2 rounded-xl text-xs font-bold border transition-all ${i === 0 ? 'active' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-500'}`;
                btn.innerText = fmt;
                btn.onclick = () => {
                    document.querySelectorAll('.format-option').forEach(b => {
                        b.classList.remove('active');
                        b.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
                    });
                    btn.classList.add('active');
                    btn.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
                    targetFormat = fmt;
                };
                formatGrid.appendChild(btn);
            });
        }

        function updateFileList() {
            fileList.innerHTML = selectedFiles.map((file, i) => `
                <div class="file-item bg-white p-4 rounded-2xl border border-slate-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden">
                        <div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center shrink-0">
                            <svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"></path></svg>
                        </div>
                        <div class="overflow-hidden">
                            <p class="text-sm font-bold text-slate-800 truncate">${file.name}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">${(file.size/1024/1024).toFixed(2)} MB</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        convertBtn.onclick = async () => {
            convertBtn.disabled = true;
            btnText.innerText = "Processing...";
            
            const progressBars = [];
            document.querySelectorAll('.file-item').forEach(item => {
                const barCont = document.createElement('div');
                barCont.className = 'w-full h-1 bg-slate-100 rounded-full mt-3 overflow-hidden';
                const bar = document.createElement('div');
                bar.className = 'h-full bg-blue-500 w-0 transition-all duration-200';
                barCont.appendChild(bar);
                item.appendChild(barCont);
                progressBars.push(bar);
            });

            // Simulate progress for all files
            for(let p = 0; p <= 100; p += 5) {
                await new Promise(r => setTimeout(r, 100));
                progressBars.forEach(b => b.style.width = p + '%');
            }

            if (selectedFiles.length > 1) {
                await downloadAsZip();
            } else {
                await downloadSingleFile();
            }

            showToast("Success! Download started.");
            btnText.innerText = "Convert & Download";
            convertBtn.disabled = false;
        };

        async function downloadSingleFile() {
            const file = selectedFiles[0];
            const name = file.name.split('.')[0] + '.' + targetFormat.toLowerCase();
            const blob = new Blob([file], { type: file.type });
            triggerDownload(blob, name);
        }

        async function downloadAsZip() {
            const zip = new JSZip();
            selectedFiles.forEach(file => {
                const newName = file.name.split('.')[0] + '.' + targetFormat.toLowerCase();
                zip.file(newName, file);
            });
            const content = await zip.generateAsync({ type: "blob" });
            triggerDownload(content, `converted_files_${Date.now()}.zip`);
        }

        function triggerDownload(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
    </script>
