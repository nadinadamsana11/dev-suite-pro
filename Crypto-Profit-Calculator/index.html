<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Profit Calculator | Pro Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .app-container {
            max-width: 1000px;
            width: 100%;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
            outline: none;
        }
        .profit-text { color: #4ade80; }
        .loss-text { color: #f87171; }
        .crypto-gradient {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen flex items-center justify-center">

    <div class="app-container">
        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight">
                <span class="text-transparent bg-clip-text crypto-gradient">Crypto Profit</span> Calculator
            </h1>
            <p class="text-slate-400 mt-3 font-medium">Analyze your trades like a professional whale.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <!-- Left: Inputs -->
            <div class="lg:col-span-5 space-y-4">
                <div class="glass-card p-6 rounded-[2rem] space-y-5">
                    <h2 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-2">Trade Details</h2>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Investment Amount ($)</label>
                        <input type="number" id="invested-amount" value="1000" class="input-field w-full p-4 rounded-2xl text-lg font-bold">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Buy Price ($)</label>
                        <input type="number" id="buy-price" value="50000" class="input-field w-full p-4 rounded-2xl text-lg font-bold">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Sell Price ($)</label>
                        <input type="number" id="sell-price" value="65000" class="input-field w-full p-4 rounded-2xl text-lg font-bold">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase text-center">Buy Fee (%)</label>
                            <input type="number" id="buy-fee" value="0.1" step="0.01" class="input-field w-full p-3 rounded-xl text-center font-bold">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase text-center">Sell Fee (%)</label>
                            <input type="number" id="sell-fee" value="0.1" step="0.01" class="input-field w-full p-3 rounded-xl text-center font-bold">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Results -->
            <div class="lg:col-span-7 flex flex-col gap-4">
                <div class="glass-card p-8 rounded-[2rem] flex-grow">
                    <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                        <div class="text-center md:text-left">
                            <p class="text-slate-400 text-sm font-bold uppercase tracking-widest mb-1">Total Profit/Loss</p>
                            <h3 class="text-5xl font-black" id="result-value">$ 0</h3>
                        </div>
                        <div class="px-6 py-3 rounded-2xl bg-slate-800/50 border border-slate-700">
                            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-wider text-center">ROI</p>
                            <p class="text-2xl font-black text-center" id="result-roi">0%</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="p-5 rounded-3xl bg-slate-900/40 border border-slate-800">
                            <span class="block text-slate-500 text-[11px] font-bold uppercase mb-1">Total Fees Paid</span>
                            <span class="text-xl font-bold text-slate-200" id="total-fees">$ 0</span>
                        </div>
                        <div class="p-5 rounded-3xl bg-slate-900/40 border border-slate-800">
                            <span class="block text-slate-500 text-[11px] font-bold uppercase mb-1">Total Exit Value</span>
                            <span class="text-xl font-bold text-slate-200" id="total-exit">$ 0</span>
                        </div>
                    </div>

                    <!-- Visual Progress -->
                    <div class="mt-8">
                        <div class="flex justify-between text-[11px] font-bold uppercase text-slate-500 mb-2">
                            <span>Investment</span>
                            <span id="progress-percentage">Profit 0%</span>
                        </div>
                        <div class="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                            <div id="result-bar" class="h-full crypto-gradient transition-all duration-500" style="width: 50%"></div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center text-center">
                         <span class="text-slate-500 text-xs font-bold uppercase mb-1">Coins Received</span>
                         <span class="text-2xl font-extrabold text-sky-400" id="coins-qty">0.00</span>
                    </div>
                    <div class="glass-card p-6 rounded-[2rem] flex flex-col items-center justify-center text-center">
                        <span class="text-slate-500 text-xs font-bold uppercase mb-1">Break-Even Price</span>
                        <span class="text-2xl font-extrabold text-slate-200" id="breakeven-price">$ 0</span>
                   </div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center">
            <p class="text-slate-600 text-[10px] font-bold uppercase tracking-widest">
                Professional Crypto Analytics Tool • 2026 Edition
            </p>
        </div>
    </div>

    <script>
        const inputs = [
            'invested-amount', 'buy-price', 'sell-price', 'buy-fee', 'sell-fee'
        ].map(id => document.getElementById(id));

        function formatCurrency(num) {
            return "$" + Number(num).toLocaleString('en-US', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            });
        }

        function calculate() {
            const investment = parseFloat(inputs[0].value) || 0;
            const buyPrice = parseFloat(inputs[1].value) || 0;
            const sellPrice = parseFloat(inputs[2].value) || 0;
            const buyFeePct = parseFloat(inputs[3].value) || 0;
            const sellFeePct = parseFloat(inputs[4].value) || 0;

            if (buyPrice <= 0 || investment <= 0) return;

            // 1. Buy Stage
            const buyFeeAmount = investment * (buyFeePct / 100);
            const netInvestment = investment - buyFeeAmount;
            const coinQuantity = netInvestment / buyPrice;

            // 2. Sell Stage
            const grossExitValue = coinQuantity * sellPrice;
            const sellFeeAmount = grossExitValue * (sellFeePct / 100);
            const netExitValue = grossExitValue - sellFeeAmount;

            // 3. Totals
            const totalProfit = netExitValue - investment;
            const totalFees = buyFeeAmount + sellFeeAmount;
            const roi = (totalProfit / investment) * 100;
            
            // 4. Break Even (Roughly: Buy Price + Fees)
            const breakEven = buyPrice / (1 - (buyFeePct + sellFeePct)/100);

            // UI Updates
            const resultValueEl = document.getElementById('result-value');
            const resultRoiEl = document.getElementById('result-roi');
            
            resultValueEl.innerText = formatCurrency(totalProfit);
            resultRoiEl.innerText = roi.toFixed(2) + "%";
            
            if (totalProfit >= 0) {
                resultValueEl.className = "text-5xl font-black profit-text";
                resultRoiEl.className = "text-2xl font-black text-center profit-text";
            } else {
                resultValueEl.className = "text-5xl font-black loss-text";
                resultRoiEl.className = "text-2xl font-black text-center loss-text";
            }

            document.getElementById('total-fees').innerText = formatCurrency(totalFees);
            document.getElementById('total-exit').innerText = formatCurrency(netExitValue);
            document.getElementById('coins-qty').innerText = coinQuantity.toFixed(8);
            document.getElementById('breakeven-price').innerText = formatCurrency(breakEven);

            // Progress Bar Logic
            const progressBar = document.getElementById('result-bar');
            const progressText = document.getElementById('progress-percentage');
            let barWidth = 50 + (roi / 2); // Simple visualization mapping
            barWidth = Math.min(Math.max(barWidth, 5), 100);
            progressBar.style.width = barWidth + "%";
            progressText.innerText = (roi >= 0 ? "Profit " : "Loss ") + Math.abs(roi).toFixed(1) + "%";
        }

        inputs.forEach(input => {
            input.addEventListener('input', calculate);
        });

        // Initial trigger
        calculate();
    </script>
    <script src="https://pl29108360.profitablecpmratenetwork.com/86/fd/f9/86fdf94d10eacfaf90713d1632fc9870.js"></script>
</body>
</html>
