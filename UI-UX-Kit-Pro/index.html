<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeKit Pro Max | Developer Ultimate Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .kit-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            border-radius: 2rem;
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }
        .kit-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 40px 80px -15px rgba(37, 99, 235, 0.15);
            border-color: #dbeafe;
        }
        .nav-pill {
            transition: all 0.3s ease;
        }
        .nav-pill.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid #f1f5f9;
        }
        .copy-btn {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        .code-block {
            background: #0f172a;
            color: #38bdf8;
            padding: 1.5rem;
            border-radius: 1.5rem;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
            overflow-x: auto;
            border: 1px solid #1e293b;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div class="min-h-screen flex flex-col max-w-6xl mx-auto bg-white shadow-2xl overflow-hidden">

        <header class="sticky top-0 z-50 glass-header px-6 py-6 md:px-10">

                <button onclick="filterKits('Tailwind')" class="nav-pill shrink-0 px-6 py-3 rounded-2xl text-xs font-bold bg-slate-100 hover:bg-slate-200">Tailwind Components</button>

        <!-- Main Gallery -->
        <main class="flex-grow p-6 md:p-10 bg-slate-50/50">
            <div id="kitGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Data will be loaded via JS -->
            </div>
        </main>

        <footer class="p-8 border-t border-slate-50 text-center bg-white flex justify-between items-center">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[4px]">Verified Code Bundles • 2026</p>
            <div class="text-[10px] font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-lg">PRO ACCESS UNLOCKED</div>

    <!-- Modal for Full Code Copy -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] overflow-hidden shadow-2xl transform transition-all">

                <div class="flex justify-between items-center mb-4">
                    <p class="text-xs font-black text-indigo-600 uppercase tracking-widest">Full Bundle Source Code</p>
                    <span class="text-[10px] text-slate-400 bg-slate-100 px-2 py-1 rounded">HTML + CSS + JS (Single File)</span>
                </div>
                
                <div id="modalCode" class="code-block custom-scrollbar max-h-[400px] mb-8 overflow-y-auto"></div>

                <div class="flex flex-col md:flex-row gap-4">
                    <button onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-900 py-5 rounded-3xl font-bold hover:bg-slate-200 transition-all">Close Viewer</button>
                    <button onclick="copyToClipboard()" class="flex-[2] copy-btn text-white py-5 rounded-3xl font-bold shadow-2xl shadow-indigo-200 flex items-center justify-center gap-3 active:scale-95 transition-all">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>
                        Copy All-in-One Code
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>

        const kitData = [
            {

                desc: 'Full landing page bundle with sticky nav and grid sections.',
                code: `<!-- Tailwind SaaS Hero Bundle -->
<nav class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b">

    <div class="flex gap-4 justify-center">
      <button class="bg-blue-600 text-white h-14 px-10 rounded-2xl font-bold shadow-lg shadow-blue-200">Start Free Trial</button>

            {

                desc: 'GSAP 3 ScrollTrigger bundle for element reveal on scroll.',
                code: `<!-- GSAP ScrollTrigger Bundle -->
<!-- Requirement: <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"><\/script> -->

            },
            {
                id: 3, type: 'Pure', title: 'Neumorphic Dashboard', icon: '🏢', color: 'bg-slate-50 text-slate-600',
                desc: 'Clean dashboard elements with Pure CSS neumorphism.',
                code: `<style>

                tags: 'Zero Deps, CSS Only'
            },
            {

                desc: 'Frosted glass sidebar with blurred background effects.',
                code: `<!-- Tailwind Glass Sidebar -->
<div class="flex h-screen bg-gradient-to-br from-indigo-500 to-purple-600 p-8">
  <aside class="w-72 bg-white/20 backdrop-blur-xl border border-white/20 rounded-[3rem] h-full overflow-hidden flex flex-col p-6 shadow-2xl text-white">
    <div class="mb-10 px-4 font-bold text-2xl">AERO.</div>
    <nav class="space-y-4">
      <a href="#" class="block px-6 py-4 bg-white/10 rounded-2xl font-semibold">Dashboard</a>
      <a href="#" class="block px-6 py-4 hover:bg-white/10 transition rounded-2xl font-semibold">Projects</a>
      <a href="#" class="block px-6 py-4 hover:bg-white/10 transition rounded-2xl font-semibold">Messages</a>
    </nav>
  </aside>
</div>`,
                tags: 'Tailwind v3.x, Modern'
            },
            {
                id: 5, type: 'GSAP', title: 'Text Animation Bundle', icon: '📝', color: 'bg-rose-50 text-rose-600',
                desc: 'Split text and character entrance animations.',
                code: `<!-- GSAP Text Bundle -->
<h1 class="char-anim text-6xl font-black">UNPARALLELED CREATIVITY</h1>

<script>
  // Simple split-character effect
  const text = document.querySelector('.char-anim');
  const chars = text.textContent.split('');
  text.innerHTML = chars.map(c => \`<span style="display:inline-block">\${c === ' ' ? '&nbsp;' : c}</span>\`).join('');

  gsap.from(".char-anim span", {
    duration: 0.8,

    rotationX: -90,

    ease: "back.out(1.7)"
  });
<\/script>`,
                tags: 'Typography, Animation'
            },
            {
                id: 6, type: 'Bootstrap', title: 'B5 Feature Grid', icon: '⚡', color: 'bg-emerald-50 text-emerald-600',
                desc: 'Clean 3-column feature section for Bootstrap 5 sites.',
                code: `<!-- Bootstrap 5 Feature Bundle -->
<div class="container py-5">
  <div class="row g-4 text-center">
    <div class="col-md-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-4">
        <div class="h1 text-primary mb-3">01</div>
        <h5 class="fw-bold">Fast Delivery</h5>
        <p class="text-muted">Quick turnarounds for all your needs.</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-4">
        <div class="h1 text-primary mb-3">02</div>
        <h5 class="fw-bold">Secure Cloud</h5>
        <p class="text-muted">Enterprise grade security protocols.</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card h-100 border-0 shadow-sm rounded-4 p-4">
        <div class="h1 text-primary mb-3">03</div>
        <h5 class="fw-bold">24/7 Support</h5>
        <p class="text-muted">We are here when you need us.</p>
      </div>
    </div>
  </div>
</div>`,
                tags: 'B5.3, No Custom CSS'
            }
            // More kits would be dynamically added or stored in external DB/Storage
        ];

        // Search and stats init
        const searchInput = document.getElementById('searchInput');
        const statsCounter = document.getElementById('statsCounter');

        function updateStats(count) {
            statsCounter.innerText = `${count} Pro Kits Found`;
        }

        function renderKits(filter = 'All', searchTerm = '') {
            const grid = document.getElementById('kitGrid');
            grid.innerHTML = '';
            
            let filtered = filter === 'All' ? kitData : kitData.filter(k => k.type === filter);
            
            if (searchTerm) {
                filtered = filtered.filter(k => 
                    k.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    k.desc.toLowerCase().includes(searchTerm.toLowerCase())
                );
            }

            updateStats(filtered.length);

            filtered.forEach(kit => {
                const card = document.createElement('div');
                card.className = 'kit-card p-6 cursor-pointer flex flex-col h-full animate-fade-in';
                card.onclick = () => openModal(kit);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-14 h-14 ${kit.color} text-3xl flex items-center justify-center rounded-2xl shadow-sm">
                            ${kit.icon}
                        </div>
                        <span class="text-[8px] font-black uppercase bg-slate-100 text-slate-500 px-3 py-1 rounded-full">${kit.type}</span>
                    </div>
                    <div class="flex-grow">
                        <h3 class="text-lg font-extrabold text-slate-900 mb-2 leading-tight">${kit.title}</h3>
                        <p class="text-xs text-slate-500 leading-relaxed mb-4">${kit.desc}</p>
                    </div>
                    <div class="pt-6 mt-auto flex items-center justify-between border-t border-slate-50">
                        <span class="text-[9px] font-bold text-indigo-600 tracking-tighter uppercase">Single File Bundle</span>
                        <div class="w-8 h-8 rounded-full bg-indigo-50 flex items-center justify-center text-indigo-600 hover:bg-indigo-600 hover:text-white transition-all">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M14 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterKits(type) {
            document.querySelectorAll('.nav-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.includes(type) || (type === 'All' && btn.innerText.includes('All')));
            });
            renderKits(type, searchInput.value);
        }

        searchInput.oninput = (e) => {
            const activeType = document.querySelector('.nav-pill.active').innerText.split(' ')[0];
            renderKits(activeType === 'All' ? 'All' : activeType, e.target.value);
        };

        function openModal(kit) {
            const modal = document.getElementById('modal');
            document.getElementById('modalHeader').innerHTML = `
                <div class="w-16 h-16 ${kit.color} text-4xl rounded-2xl flex items-center justify-center shadow-lg">${kit.icon}</div>
                <div>
                    <span class="text-xs font-black uppercase text-indigo-500 tracking-[5px] block">${kit.type} Framework</span>
                    <span class="text-xs text-slate-400 font-bold">${kit.tags}</span>
                </div>
            `;
            document.getElementById('modalTitle').innerText = kit.title;
            const codeArea = document.getElementById('modalCode');
            codeArea.innerText = kit.code;
            
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function copyToClipboard() {
            const code = document.getElementById('modalCode').innerText;
            const textArea = document.createElement("textarea");
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const btn = document.querySelector('.copy-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = `
                <svg class="w-6 h-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                Copied to Clipboard!
            `;
            setTimeout(() => btn.innerHTML = originalText, 2000);
        }

        // Initial render
        renderKits();
    </script>

</body>
